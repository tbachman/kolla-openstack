kolla_deployer_user: noiro
kolla_venv_path: "/home/{{ kolla_deployer_user }}/kolla-venv"
kolla_ansible_collections_path: "/home/{{ kolla_deployer_user }}/.ansible/collections:/usr/share/ansible/collections"
kolla_ansible_version_constraint: ">=20.3.0,<21.0.0"
kolla_ansible_core_version_constraint: ">=2.17,<2.19"
kolla_package_version: "20.3.0"
kolla_ansible_pip_package: "kolla-ansible{{ kolla_ansible_version_constraint }}"
kolla_ansible_core_pip_package: "ansible-core{{ kolla_ansible_core_version_constraint }}"
kolla_pip_extra_args: ""
kolla_pip_wheelhouse: ""
kolla_http_proxy: "http://proxy.esl.cisco.com:80"
kolla_https_proxy: "http://proxy.esl.cisco.com:80"
kolla_no_proxy_extra:
  - 172.25.235.0/24
  - localhost
  - 127.0.0.1
kolla_no_proxy: "{{ ((groups['all'] | default([])) + (groups['all'] | default([]) | map('extract', hostvars, 'ansible_host') | select('defined') | list) + kolla_no_proxy_extra) | unique }}"
kolla_openstack_release: "2025.1"
kolla_base_distro: ubuntu
kolla_install_type: binary
kolla_internal_vip_address: 172.25.235.204
kolla_network_interface: enp1s0
kolla_neutron_external_interface: bond0
kolla_enable_haproxy: true

kolla_manage_netplan: true
kolla_netplan_file: /etc/netplan/01-kolla.yaml
kolla_netplan_renderer: networkd
kolla_netplan_bond_enabled: true
kolla_primary_interface:
  name: "{{ kolla_network_interface }}"
  gateway: 172.25.235.1
  dns_servers:
    - 172.28.184.18
  dns_search:
    - noiro.lab
kolla_manage_host_openvswitch_service: false
kolla_cleanup_openvswitch_runtime: true
kolla_bond:
  name: bond0
  mtu: 9000
  interfaces:
    - enp7s0
    - enp8s0
  parameters:
    mode: 802.3ad
    lacp-rate: fast
    transmit-hash-policy: layer3+4

kolla_manage_hosts_file: true
kolla_host_entries: []
kolla_chrony_server_entries:
  - "server 10.81.254.202 iburst minpoll 6 maxpoll 10"

kolla_common_packages:
  - python3
  - python3-pip
  - python3-venv
  - python3-dev
  - gcc
  - libffi-dev
  - libssl-dev
  - curl
  - jq
  - iputils-ping
  - net-tools
  - chrony
  - ca-certificates
  - apt-transport-https
  - software-properties-common
  - lvm2
  - bridge-utils
  - openvswitch-switch
  - python3-docker
  - docker.io

kolla_enable_neutron_ndfc: true
kolla_enable_neutron_segments: true
kolla_enable_neutron_trunk: true
kolla_enable_neutron_metering: true
kolla_enable_neutron_bgp_dragent: true
kolla_enable_keystone: true
kolla_enable_glance: true
kolla_enable_nova: true
kolla_enable_neutron: true
kolla_enable_placement: true
kolla_enable_horizon: true
kolla_enable_heat: true
kolla_enable_cinder: false
kolla_enable_ironic: true
kolla_enable_ironic_dnsmasq: false
kolla_enable_octavia: false

kolla_neutron_plugin_agent: ovn
kolla_enable_openvswitch: true
kolla_enable_ovn: true
kolla_enable_provider_networks: true
kolla_neutron_physical_networks: physnet1
kolla_neutron_network_vlan_ranges: physnet1:1:3900
kolla_neutron_type_drivers: flat,vlan
kolla_neutron_tenant_network_types: vlan
#kolla_neutron_type_drivers: nd,geneve,gre,vlan,flat,local
#kolla_neutron_tenant_network_types: nd,geneve,gre,vlan,flat,local

kolla_generate_passwords: true
kolla_run_install_deps: true
kolla_run_bootstrap_servers: true
kolla_run_prechecks: true
kolla_run_deploy: true
kolla_run_post_deploy: true
kolla_install_openstack_client: true
kolla_openstack_client_packages:
  - python3-openstackclient
kolla_admin_openrc_mode: "0644"

kolla_enable_cisco_ndfc: true
kolla_cisco_build_images: false
#kolla_cisco_build_images: true
kolla_docker_registry_login_enabled: false
kolla_docker_registry: ""
kolla_docker_registry_username: ""
kolla_docker_registry_password: ""
kolla_neutron_server_image: kolla/neutron-server
kolla_neutron_server_tag: "20.3.0"
kolla_neutron_cisco_topology_agent_image: kolla/neutron-cisco-topology-agent
kolla_neutron_cisco_topology_agent_tag: "20.3.0"
kolla_neutron_subprojects:
  - name: networking-cisco
    enabled: true
kolla_neutron_mechanism_drivers:
  - name: ndfc
  - name: ovn
  - name: logger
kolla_neutron_extension_drivers:
  - name: port_security
#  - name: nd_extension_driver
kolla_ndfc_config:
  ndfc_ip: 172.25.235.51
  user: admin
  pwd: Noir0123!
  fabric_name: nd-ostack-1
  switch_sync_interval: "180"
  enable_keystone_notification_purge: true
  keystone_notification_exchange: keystone
  keystone_notification_topic: notifications
  force_old_api: false
  enable_l3_on_border: false
  vlan_hardware_l3: true
  nd_sync_poll_interval: 600
kolla_keystone_notification_topics:
  - name: notifications
    enabled: true
