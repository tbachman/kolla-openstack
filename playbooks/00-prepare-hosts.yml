- name: Prepare all hosts for Kolla
  hosts: all
  become: true
  vars:
    kolla_proxy_env:
      http_proxy: "{{ kolla_http_proxy }}"
      https_proxy: "{{ kolla_https_proxy }}"
      no_proxy: "{{ kolla_no_proxy | join(',') }}"
      HTTP_PROXY: "{{ kolla_http_proxy }}"
      HTTPS_PROXY: "{{ kolla_https_proxy }}"
      NO_PROXY: "{{ kolla_no_proxy | join(',') }}"
  tasks:
    - name: Disable cloud-init network management
      ansible.builtin.copy:
        dest: /etc/cloud/cloud.cfg.d/99-disable-network-config.cfg
        content: |
          network:
            config: disabled
        owner: root
        group: root
        mode: "0644"

    - name: Preserve existing hostnames
      ansible.builtin.copy:
        dest: /etc/cloud/cloud.cfg.d/99-disable-hostname.cfg
        content: |
          preserve_hostname: true
        owner: root
        group: root
        mode: "0644"

    - name: Optionally remove the default cloud-init netplan
      ansible.builtin.file:
        path: /etc/netplan/50-cloud-init.yaml
        state: absent
      register: kolla_cloud_init_netplan
      when: kolla_manage_netplan | bool

    - name: Require a host-specific primary interface address when managing netplan
      ansible.builtin.assert:
        that:
          - kolla_primary_interface_address is defined
          - kolla_primary_interface_address | length > 0
        fail_msg: "Set kolla_primary_interface_address for each host in the inventory before enabling kolla_manage_netplan."
      when: kolla_manage_netplan | bool

    - name: Render Kolla netplan file when enabled
      ansible.builtin.template:
        src: ../templates/01-kolla.yaml.j2
        dest: "{{ kolla_netplan_file }}"
        owner: root
        group: root
        mode: "0600"
      register: kolla_netplan_config
      when: kolla_manage_netplan | bool

    - name: Apply netplan when configuration changes
      ansible.builtin.command:
        cmd: netplan apply
      when:
        - kolla_manage_netplan | bool
        - (kolla_cloud_init_netplan is defined and kolla_cloud_init_netplan.changed) or
          (kolla_netplan_config is defined and kolla_netplan_config.changed)

    - name: Manage host entries for inventory nodes
      ansible.builtin.lineinfile:
        path: /etc/hosts
        state: present
        line: "{{ hostvars[item].ansible_host }} {{ item }}"
      loop: "{{ groups['all'] | default([]) }}"
      when:
        - kolla_manage_hosts_file | bool
        - hostvars[item].ansible_host is defined

    - name: Remove 127.0.1.1 host mapping
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '^127\.0\.1\.1\s+'
        state: absent
      when: kolla_manage_hosts_file | bool

    - name: Install host prerequisites
      ansible.builtin.apt:
        name: "{{ kolla_common_packages }}"
        state: present
        update_cache: true
      environment: "{{ kolla_proxy_env }}"

    - name: Configure chrony server entries
      ansible.builtin.lineinfile:
        path: /etc/chrony/chrony.conf
        line: "{{ item }}"
        state: present
      loop: "{{ kolla_chrony_server_entries | default([]) }}"
      register: kolla_chrony_config

    - name: Restart chrony after configuration change
      ansible.builtin.systemd:
        name: chrony
        state: restarted
      when: kolla_chrony_config is changed

    - name: Stop and disable host openvswitch-switch when using Kolla-managed OVS
      ansible.builtin.systemd:
        name: openvswitch-switch
        enabled: false
        state: stopped
      when:
        - not kolla_manage_host_openvswitch_service | bool

    - name: Find stale Open vSwitch runtime files
      ansible.builtin.find:
        paths:
          - /run/openvswitch
          - /var/run/openvswitch
        patterns:
          - "*.pid"
          - "*.ctl"
          - "*.sock"
        file_type: any
      register: kolla_openvswitch_runtime_files
      when:
        - kolla_cleanup_openvswitch_runtime | bool
      failed_when: false

    - name: Check for running Kolla Open vSwitch containers
      ansible.builtin.command:
        cmd: "docker ps --format {{ '{{.Names}}' }}"
      register: kolla_running_docker_containers
      changed_when: false
      failed_when: false
      when:
        - kolla_cleanup_openvswitch_runtime | bool

    - name: Refuse OVS runtime cleanup while Kolla OVS containers are running
      ansible.builtin.assert:
        that:
          - "'openvswitch_db' not in (kolla_running_docker_containers.stdout_lines | default([]))"
          - "'openvswitch_vswitchd' not in (kolla_running_docker_containers.stdout_lines | default([]))"
        fail_msg: "Refusing to delete /run/openvswitch while Kolla OVS containers are running. Stop/remove the containers first, or leave kolla_cleanup_openvswitch_runtime disabled."
      when:
        - kolla_cleanup_openvswitch_runtime | bool

    - name: Remove stale Open vSwitch runtime files
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ kolla_openvswitch_runtime_files.files | default([]) }}"
      when:
        - kolla_cleanup_openvswitch_runtime | bool

    - name: Ensure Docker systemd override directory exists when proxy is configured
      ansible.builtin.file:
        path: /etc/systemd/system/docker.service.d
        state: directory
        owner: root
        group: root
        mode: "0755"
      when:
        - kolla_http_proxy | length > 0 or kolla_https_proxy | length > 0

    - name: Configure Docker daemon proxy
      ansible.builtin.template:
        src: ../templates/docker-http-proxy.conf.j2
        dest: /etc/systemd/system/docker.service.d/http-proxy.conf
        owner: root
        group: root
        mode: "0644"
      register: docker_proxy_config
      when:
        - kolla_http_proxy | length > 0 or kolla_https_proxy | length > 0

    - name: Remove Docker daemon proxy when no proxy is configured
      ansible.builtin.file:
        path: /etc/systemd/system/docker.service.d/http-proxy.conf
        state: absent
      register: docker_proxy_config_removed
      when:
        - kolla_http_proxy | length == 0
        - kolla_https_proxy | length == 0

    - name: Reload systemd after Docker proxy change
      ansible.builtin.systemd:
        daemon_reload: true
      when:
        - (docker_proxy_config is defined and docker_proxy_config.changed) or
          (docker_proxy_config_removed is defined and docker_proxy_config_removed.changed)

    - name: Restart Docker after proxy change
      ansible.builtin.systemd:
        name: docker
        state: restarted
      when:
        - (docker_proxy_config is defined and docker_proxy_config.changed) or
          (docker_proxy_config_removed is defined and docker_proxy_config_removed.changed)

    - name: Enable required services
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
        state: started
      loop:
        - chrony
        - docker

    - name: Ensure the deployer user can access Docker
      ansible.builtin.user:
        name: "{{ kolla_deployer_user }}"
        groups: docker
        append: true
