---
# globals.yml — kolla-ansible main configuration
# Reference: https://docs.openstack.org/kolla-ansible/latest/reference/
#
# REQUIRED: Search for "CHANGE_ME" and update every value before deploying.
# OPTIONAL: Commented-out keys show common customisations with their defaults.

##############################################################################
# General
##############################################################################

# OpenStack release name (must match your kolla-ansible pip version)
openstack_release: "2024.1"

# Docker namespace for kolla images
kolla_base_distro: "ubuntu"
kolla_install_type: "binary"   # "source" to build from git

# Deployment type: "yes" = high-availability with Keepalived VIPs
#                  "no"  = single-node (no VIPs, no HAProxy)
enable_haproxy: "yes"

##############################################################################
# Network — CHANGE_ME
##############################################################################

# IP address that will be used by OpenStack API endpoints.
# For all-in-one this is usually the host's primary IP.
# For HA multinode this must be a free IP on your management network.
kolla_internal_vip_address: "CHANGE_ME"   # e.g. "192.168.100.10"

# (Optional) Separate VIP for external/public APIs.
# Defaults to kolla_internal_vip_address when unset.
#kolla_external_vip_address: "CHANGE_ME"

# Network interface used for OpenStack management traffic.
# This interface must be reachable from all nodes.
network_interface: "CHANGE_ME"   # e.g. "eth0" or "ens3"

# Interface used for Neutron external/provider network traffic.
# Typically a second NIC that is either bridged or has no IP.
neutron_external_interface: "CHANGE_ME"   # e.g. "eth1"

# (Optional) Separate interface for storage traffic.
# Defaults to network_interface when unset.
#storage_interface: "eth2"

# (Optional) Separate interface for cluster (Ceph/Galera) traffic.
#cluster_interface: "eth3"

##############################################################################
# TLS / FQDN (optional but recommended for production)
##############################################################################

# Enable TLS on the public endpoint
#kolla_enable_tls_external: "yes"
#kolla_external_fqdn: "openstack.example.com"

# Enable TLS on the internal endpoint
#kolla_enable_tls_internal: "yes"
#kolla_internal_fqdn: "openstack-internal.example.com"

##############################################################################
# Docker
##############################################################################

# Docker registry. Leave empty to pull from Docker Hub (docker.io/kolla/).
#docker_registry: "registry.example.com"
#docker_registry_username: "myuser"
#docker_registry_insecure: "no"

# Increase if image pulls timeout on slow links (seconds)
#docker_pull_timeout: "120"

##############################################################################
# Core OpenStack services — enable/disable as needed
##############################################################################

# Compute
enable_nova: "yes"
enable_nova_ssh: "yes"

# Identity
enable_keystone: "yes"

# Image
enable_glance: "yes"

# Networking
enable_neutron: "yes"

# Block storage
enable_cinder: "no"     # Set "yes" and configure cinder_volume_group below

# Dashboard
enable_horizon: "yes"

# Orchestration
enable_heat: "yes"

# Bare metal (requires dedicated network)
#enable_ironic: "no"

##############################################################################
# Neutron / networking
##############################################################################

# Neutron plugin: "linuxbridge" or "openvswitch" (default)
#neutron_plugin_agent: "openvswitch"

# Enable DVR (Distributed Virtual Routing) — multinode only
#neutron_l3_ha: "no"
#enable_neutron_dvr: "no"

# Enable provider networks (flat/VLAN)
#enable_neutron_provider_networks: "yes"

# Enable L2 population
#enable_neutron_l2population: "yes"

##############################################################################
# Nova / hypervisor
##############################################################################

# Virtualisation type: "kvm" (bare-metal host), "qemu" (nested/VM host)
nova_compute_virt_type: "kvm"

# Enable live migration
#nova_console_type: "novnc"    # "spice" or "novnc"

##############################################################################
# Cinder / block storage (only if enable_cinder: "yes")
##############################################################################

# Name of the LVM volume group to use for Cinder LVM backend.
# Create with: vgcreate cinder-volumes /dev/sdX
#cinder_volume_group: "cinder-volumes"

# Ceph RBD backend (alternative to LVM — requires enable_ceph: "yes")
#cinder_backend_ceph: "yes"

##############################################################################
# Ceph (optional, for shared storage across services)
##############################################################################

#enable_ceph: "no"
#enable_ceph_rgw: "no"      # Ceph Object Gateway (S3/Swift compatible)
#enable_ceph_dashboard: "no"

##############################################################################
# Additional services (all disabled by default)
##############################################################################

# Load balancing
#enable_octavia: "no"

# DNS
#enable_designate: "no"

# Key management
#enable_barbican: "no"

# Secrets management
#enable_vault: "no"

# Telemetry
#enable_ceilometer: "no"
#enable_aodh: "no"

# Container orchestration (Magnum / Kubernetes as a service)
#enable_magnum: "no"

# Shared file systems
#enable_manila: "no"

# Workflow
#enable_mistral: "no"

# Message queuing
#enable_zaqar: "no"

##############################################################################
# MariaDB / RabbitMQ tuning (optional)
##############################################################################

#mariadb_innodb_buffer_pool_size: "1G"
#mariadb_max_connections: "500"

##############################################################################
# Keepalived / HAProxy
##############################################################################

# VRRP authentication password (auto-generated if unset but setting it
# explicitly avoids regeneration on reconfigure)
#keepalived_password: "CHANGE_ME_32CHARS"

# Custom HAProxy timeouts
#haproxy_client_timeout: "1m"
#haproxy_server_timeout: "1m"
